<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', Menlo, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#150D27"/>
      <stop offset="1" stop-color="#0B0616"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#836EF9" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#836EF9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fillLong" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fillShort" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5C7A" stop-opacity="0"/>
      <stop offset="1" stop-color="#FF5C7A" stop-opacity="0.10"/>
    </linearGradient>
    <clipPath id="card">
      <rect x="40" y="40" width="1120" height="550" rx="20"/>
    </clipPath>
  </defs>

  <!-- outer background -->
  <rect width="1200" height="630" fill="#060310"/>

  <!-- terminal card -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="url(#cardBg)"/>

  <g clip-path="url(#card)">
    <!-- ambient purple glow, top right -->
    <ellipse cx="1040" cy="70" rx="460" ry="280" fill="url(#glow)"/>

    <!-- chart pane grid -->
    <g stroke="#A78BFA" stroke-opacity="0.07" stroke-width="1">
      <line x1="660" y1="140" x2="660" y2="470"/>
      <line x1="740" y1="140" x2="740" y2="470"/>
      <line x1="820" y1="140" x2="820" y2="470"/>
      <line x1="900" y1="140" x2="900" y2="470"/>
      <line x1="980" y1="140" x2="980" y2="470"/>
      <line x1="1060" y1="140" x2="1060" y2="470"/>
      <line x1="620" y1="160" x2="1120" y2="160"/>
      <line x1="620" y1="230" x2="1120" y2="230"/>
      <line x1="620" y1="370" x2="1120" y2="370"/>
      <line x1="620" y1="440" x2="1120" y2="440"/>
    </g>

    <!-- spread fills: what the hedge cancels -->
    <polygon fill="url(#fillLong)" points="620,296 650,280 678,292 708,264 736,278 766,250 794,268 824,240 852,258 882,228 910,250 940,220 968,242 998,212 1026,236 1056,206 1084,230 1120,200 1120,300 620,300"/>
    <polygon fill="url(#fillShort)" points="620,304 650,320 678,308 708,336 736,322 766,350 794,332 824,360 852,342 882,372 910,350 940,380 968,358 998,388 1026,364 1056,394 1084,370 1120,400 1120,300 620,300"/>

    <!-- long spot leg -->
    <polyline points="620,296 650,280 678,292 708,264 736,278 766,250 794,268 824,240 852,258 882,228 910,250 940,220 968,242 998,212 1026,236 1056,206 1084,230 1120,200"
      stroke="#34D399" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- short perp leg (exact mirror) -->
    <polyline points="620,304 650,320 678,308 708,336 736,322 766,350 794,332 824,360 852,342 882,372 910,350 940,380 968,358 998,388 1026,364 1056,394 1084,370 1120,400"
      stroke="#FF5C7A" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- net: perfectly flat -->
    <line x1="620" y1="300" x2="1120" y2="300" stroke="#836EF9" stroke-width="12" stroke-opacity="0.18" stroke-linecap="round"/>
    <line x1="620" y1="300" x2="1120" y2="300" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>

    <!-- endpoints -->
    <circle cx="1120" cy="200" r="5" fill="#34D399"/>
    <circle cx="1120" cy="400" r="5" fill="#FF5C7A"/>
    <circle cx="1120" cy="300" r="6" fill="#C4B5FD"/>

    <!-- leg labels -->
    <text x="1114" y="180" text-anchor="end" font-size="13" font-weight="700" fill="#34D399" letter-spacing="1">LONG SPOT MON</text>
    <text x="1114" y="430" text-anchor="end" font-size="13" font-weight="700" fill="#FF5C7A" letter-spacing="1">SHORT MON-PERP</text>

    <!-- net badge -->
    <rect x="716" y="282" width="150" height="36" rx="18" fill="#160D2B" stroke="#836EF9" stroke-width="1.5"/>
    <text x="791" y="305" text-anchor="middle" font-size="15" font-weight="700" fill="#C4B5FD">NET Δ = 0</text>
  </g>

  <!-- card border on top of clipped content -->
  <rect x="40" y="40" width="1120" height="550" rx="20" stroke="#836EF9" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- header bar -->
  <line x1="41" y1="96" x2="1159" y2="96" stroke="#836EF9" stroke-opacity="0.18"/>
  <g opacity="0.6">
    <circle cx="76" cy="68" r="6.5" fill="#FF5F56"/>
    <circle cx="100" cy="68" r="6.5" fill="#FFBD2E"/>
    <circle cx="124" cy="68" r="6.5" fill="#27C93F"/>
  </g>
  <text x="152" y="73" font-size="15" fill="#8B84A8">zerodrift — Δ-neutral points engine</text>

  <!-- pane divider -->
  <line x1="600" y1="97" x2="600" y2="519" stroke="#FFFFFF" stroke-opacity="0.05"/>

  <!-- left column -->
  <text x="88" y="158" font-size="12" letter-spacing="2.5" fill="#836EF9" font-weight="700">PERPL · PURPLE SUMMER · MONAD MAINNET</text>

  <text x="86" y="252" font-size="84" font-weight="800" letter-spacing="-2">
    <tspan fill="#F2EFFB">ZERO</tspan><tspan fill="#836EF9">DRIFT</tspan>
  </text>
  <rect x="548" y="196" width="13" height="56" fill="#34D399">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <text x="88" y="336" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#DCD6F0">Farm Perpl points without betting on price.</text>
  <text x="88" y="374" font-size="15" fill="#8B84A8"><tspan fill="#34D399">$</tspan> hold MON · short perp · churn maker volume</text>

  <!-- live pill -->
  <rect x="88" y="408" width="270" height="36" rx="18" fill="#34D399" fill-opacity="0.07" stroke="#34D399" stroke-opacity="0.4"/>
  <circle cx="110" cy="426" r="4.5" fill="#34D399"/>
  <text x="124" y="431" font-size="13" fill="#7EE7BD">LIVE — hedge.nullterminal.xyz</text>

  <!-- status bar -->
  <line x1="41" y1="520" x2="1159" y2="520" stroke="#836EF9" stroke-opacity="0.18"/>
  <g font-size="13" font-weight="700">
    <rect x="88" y="536" width="170" height="32" rx="16" fill="#34D399" fill-opacity="0.08" stroke="#34D399" stroke-opacity="0.35"/>
    <text x="173" y="557" text-anchor="middle" fill="#7EE7BD">FUNDING +17.5% APR</text>
    <rect x="270" y="536" width="132" height="32" rx="16" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="336" y="557" text-anchor="middle" fill="#C4B5FD">MAKER 0.9 bps</text>
    <rect x="414" y="536" width="126" height="32" rx="16" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="477" y="557" text-anchor="middle" fill="#C4B5FD">2× MON BOOST</text>
    <rect x="552" y="536" width="188" height="32" rx="16" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="646" y="557" text-anchor="middle" fill="#C4B5FD">REGISTRY 0x24BD…3A48</text>
  </g>
  <text x="1112" y="557" text-anchor="end" font-size="13" fill="#8B84A8">immutable · ownerless · holds no funds</text>
</svg>
